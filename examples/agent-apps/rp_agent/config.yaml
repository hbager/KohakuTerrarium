# RP Agent Configuration
# A role-playing chatbot with memory and output sub-agent pattern

name: rp_agent
version: "1.0"

# LLM Configuration - Controller (orchestration)
controller:
  model: "${OPENROUTER_MODEL:google/gemini-3.1-pro-preview}"
  temperature: 0.7
  max_tokens: 65536
  api_key_env: OPENROUTER_API_KEY
  base_url: https://openrouter.ai/api/v1

# System prompt (loaded from file)
system_prompt_file: prompts/system.md

# Startup trigger - initialize character on start
startup_trigger:
  prompt: "Agent starting. Use memory_read to get your character definition and rules. Then greet as your character."

# Input configuration
input:
  type: cli
  prompt: "User: "

# Available tools (needed by controller and sub-agents)
tools:
  - name: tree
    type: builtin
  - name: read
    type: builtin
  - name: write
    type: builtin
  - name: edit
    type: builtin
  - name: grep
    type: builtin
  - name: glob
    type: builtin

# Sub-agents - the core of the RP architecture
subagents:
  # Memory agents - background memory operations
  - name: memory_read
    type: builtin
  - name: memory_write
    type: builtin

  # Output sub-agent - generates in-character responses
  - name: output
    type: custom
    description: Generate in-character roleplay responses
    prompt_file: prompts/output.md
    interactive: true
    context_mode: interrupt_restart
    output_to: external
    tools: []
    max_turns: 3

# Output configuration
output:
  type: stdout
  controller_direct: false  # Output goes through sub-agent

# Memory configuration
memory:
  path: ./memory
  init_files:
    - character.md  # Role/character definition (read-only)
    - rules.md      # Protected rules
  writable_files:
    - context.md
    - facts.md
    - preferences.md

compact:
  max_tokens: 1000000
