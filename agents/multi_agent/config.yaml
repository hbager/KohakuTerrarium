# Multi-Agent Collaboration Demo
# Controller dispatches to research and worker sub-agents via channels

name: multi_agent
version: "1.0"

controller:
  model: "${OPENROUTER_MODEL:google/gemini-3-flash-preview}"
  temperature: 0.7
  max_tokens: 512000
  api_key_env: OPENROUTER_API_KEY
  base_url: https://openrouter.ai/api/v1

system_prompt_file: prompts/manager.md

input:
  type: cli
  prompt: "Task: "

# Tools: controller tools + all tools sub-agents need (worker needs write/edit/bash)
tools:
  - name: send_message
    type: builtin
  - name: wait_channel
    type: builtin
  - name: scratchpad
    type: builtin
  - name: think
    type: builtin
  - name: read
    type: builtin
  - name: write
    type: builtin
  - name: edit
    type: builtin
  - name: bash
    type: builtin
  - name: glob
    type: builtin
  - name: grep
    type: builtin
  - name: http
    type: builtin

# Sub-agents dispatched by the controller
subagents:
  - name: explore
    type: builtin
    extra_prompt: "Report findings to the controller concisely."
  - name: research
    type: builtin
  - name: worker
    type: builtin
  - name: coordinator
    type: builtin
  - name: summarize
    type: builtin
  - name: critic
    type: builtin


output:
  type: stdout
  controller_direct: true
