# SWE Agent Configuration
# A software engineering agent similar to Claude Code

name: swe_agent
version: "1.0"

# LLM Configuration
# Options: mistralai/mistral-small-3.1-24b-instruct (cheap/fast)
#          mistralai/devstral-small-2505 (free, agentic coding)
#          qwen/qwen3-32b (good balance)
controller:
  model: "${OPENROUTER_MODEL:mistralai/mistral-small-3.1-24b-instruct}"
  temperature: 0.7
  max_tokens: 4096
  api_key_env: OPENROUTER_API_KEY
  base_url: https://openrouter.ai/api/v1

# System prompt (loaded from file)
system_prompt_file: prompts/system.md

# Input configuration
input:
  type: cli
  prompt: "You: "

# Available tools
tools:
  - name: bash
    type: builtin
  - name: python
    type: builtin
  - name: read
    type: builtin
  - name: write
    type: builtin
  - name: edit
    type: builtin
  - name: glob
    type: builtin
  - name: grep
    type: builtin

# Output configuration
output:
  type: stdout
  controller_direct: true
